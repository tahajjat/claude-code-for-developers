<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Claude Code for Software Developers — Agentic Software Engineering</title>

  <!-- Reveal.js 5.1 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/atom-one-dark.min.css">

  <!-- Presentation skin -->
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>

<!-- ══════════════ LEFT THUMBNAIL PANEL ══════════════ -->
<nav id="slide-nav">
  <div id="slide-nav-header">
    <span class="slide-nav-title">Slides</span>
    <button id="slide-nav-toggle" title="Collapse">‹</button>
  </div>
  <ul id="slide-nav-list"></ul>
</nav>

<!-- Collapsed re-open tab -->
<button id="slide-nav-open" title="Open slide panel">›</button>

<!-- ══════════════ MAIN PRESENTATION ══════════════ -->
<div class="reveal">
  <div class="slides">

    <section data-markdown="slides/01-intro.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

    <section data-markdown="slides/02-setup.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

    <section data-markdown="slides/03-planning.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

    <section data-markdown="slides/04-architecture.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

    <section data-markdown="slides/05-backend.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

    <section data-markdown="slides/06-frontend.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

    <section data-markdown="slides/07-security.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

    <section data-markdown="slides/08-database.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

    <section data-markdown="slides/09-cicd.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

    <section data-markdown="slides/10-live-project.md"
             data-separator="^\n---\n"
             data-separator-notes="^Notes:"></section>

  </div>
</div>

<!-- ══════════════ BOTTOM NAVIGATION BAR ══════════════ -->
<div id="nav-controls">
  <button id="btn-prev"  class="nav-btn" title="Previous slide">◀</button>
  <div id="slide-counter">
    <span id="slide-current">1</span>
    <span class="counter-sep">/</span>
    <span id="slide-total">—</span>
  </div>
  <button id="btn-reset" class="nav-btn nav-btn-reset" title="Go to first slide">↺</button>
  <button id="btn-next"  class="nav-btn" title="Next slide">▶</button>
</div>

<!-- Reveal.js 5.1 core + plugins -->
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>

<script>
  /* ──────────────────────────────────────────────────
     Constants
  ────────────────────────────────────────────────── */
  const NAV_W       = 230;
  const SLIDE_W     = 1280;
  const SLIDE_H     = 720;
  const THUMB_W     = 214;                          // frame width (NAV_W - padding*2)
  const THUMB_SCALE = THUMB_W / SLIDE_W;            // ≈ 0.167
  const THUMB_H     = Math.round(SLIDE_H * THUMB_SCALE); // ≈ 120px

  let allSlides  = [];
  let navOpen    = true;
  let thumbSheet = null; // shared CSSStyleSheet for all shadow DOMs

  /* ──────────────────────────────────────────────────
     deck-stage technique: load custom.css and strip
     ".reveal " prefix so rules apply inside shadow DOM
  ────────────────────────────────────────────────── */
  async function loadThumbSheet() {
    try {
      const raw = await fetch('assets/css/custom.css').then(r => r.text());
      const css = raw
        // ".reveal .slides section { … }" → "section { … }"
        .replace(/\.reveal\s+\.slides\s+section\b/g, 'section')
        // ".reveal .slides { … }" → left empty (not needed in thumb)
        .replace(/\.reveal\s+\.slides\b/g, ':host')
        // ".reveal h1 { … }" → "h1 { … }"
        .replace(/\.reveal\s+/g, '')
        // bare ".reveal { … }" → drop the selector (host inherits)
        .replace(/^\.reveal\s*\{/gm, ':host {');
      const sheet = new CSSStyleSheet();
      await sheet.replace(css);
      return sheet;
    } catch (e) {
      console.warn('deck-stage: could not load thumb stylesheet', e);
      return null;
    }
  }

  /* ──────────────────────────────────────────────────
     Layout helper
  ────────────────────────────────────────────────── */
  function setNavWidth(w) {
    document.documentElement.style.setProperty('--slide-nav-width', w + 'px');
    if (Reveal.isReady && Reveal.isReady()) Reveal.layout();
  }

  /* ──────────────────────────────────────────────────
     Reveal initialisation
  ────────────────────────────────────────────────── */
  Reveal.initialize({
    hash:            true,
    slideNumber:     false,
    width:           SLIDE_W,
    height:          SLIDE_H,
    margin:          0,
    minScale:        0.2,
    maxScale:        2.0,
    transition:      'slide',
    transitionSpeed: 'fast',
    controls:        false,
    progress:        true,
    center:          false,
    plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
  });

  /* ──────────────────────────────────────────────────
     After markdown renders: load CSS then build thumbs
  ────────────────────────────────────────────────── */
  Reveal.on('ready', async () => {
    allSlides  = Reveal.getSlides();
    thumbSheet = await loadThumbSheet();
    buildThumbnails();
    syncState();
  });

  Reveal.on('slidechanged', syncState);

  /* ──────────────────────────────────────────────────
     buildThumbnails — deck-stage shadow DOM technique
     Each thumbnail is a Shadow Root that adopts the
     author stylesheet, so every CSS rule applies exactly
     as it does in the real slide.
  ────────────────────────────────────────────────── */
  function buildThumbnails() {
    const list = document.getElementById('slide-nav-list');

    allSlides.forEach((slide, i) => {
      /* ── list item ──────────────────────────────── */
      const li     = document.createElement('li');
      li.className = 'slide-thumb-item';
      const idx    = Reveal.getIndices(slide);
      li.dataset.h = idx.h;
      li.dataset.v = idx.v || 0;

      /* ── frame: clips the 1280×720 clone ────────── */
      const frame     = document.createElement('div');
      frame.className = 'slide-thumb-frame';

      /* ── shadow DOM host (fills the frame) ───────── */
      const host = document.createElement('div');
      host.style.cssText = 'position:absolute;inset:0;overflow:hidden;';
      const shadow = host.attachShadow({ mode: 'open' });

      // Adopt the modified author stylesheet (deck-stage technique)
      if (thumbSheet) shadow.adoptedStyleSheets = [thumbSheet];

      /* ── deep-clone the slide section ───────────── */
      const clone = slide.cloneNode(true);
      // Remove Reveal.js runtime state classes
      clone.classList.remove('present', 'past', 'future', 'stack');
      // Remove nested section stacks Reveal adds
      clone.querySelectorAll('section').forEach(s => s.remove());

      const bg = slide.getAttribute('data-background-color') || '#1E2761';
      clone.style.cssText =
        `position:absolute;top:0;left:0;` +
        `width:${SLIDE_W}px;height:${SLIDE_H}px;` +
        `transform:scale(${THUMB_SCALE});transform-origin:top left;` +
        `overflow:hidden;` +
        `padding:1.6rem 2.2rem 3.2rem;box-sizing:border-box;` +
        `background:${bg};color:#DCE2EF;` +
        `font-family:'Inter','Segoe UI',Arial,sans-serif;font-size:16px;`;

      shadow.appendChild(clone);
      frame.appendChild(host);

      /* ── slide number badge ─────────────────────── */
      const badge     = document.createElement('span');
      badge.className = 'thumb-num-badge';
      badge.textContent = i + 1;

      li.appendChild(frame);
      li.appendChild(badge);
      li.addEventListener('click', () => Reveal.slide(+li.dataset.h, +li.dataset.v));
      list.appendChild(li);
    });
  }

  /* ──────────────────────────────────────────────────
     Sync active thumbnail highlight + counter
  ────────────────────────────────────────────────── */
  function syncState() {
    const current = Reveal.getCurrentSlide();
    const { indexh, indexv } = Reveal.getIndices();
    const h = indexh, v = indexv || 0;

    document.querySelectorAll('.slide-thumb-item').forEach(item => {
      const active = +item.dataset.h === h && +item.dataset.v === v;
      item.classList.toggle('active', active);
      if (active) item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    });

    const flat = allSlides.indexOf(current);
    document.getElementById('slide-current').textContent = flat + 1;
    document.getElementById('slide-total').textContent   = allSlides.length;
  }

  /* ──────────────────────────────────────────────────
     Bottom controls
  ────────────────────────────────────────────────── */
  document.getElementById('btn-prev').addEventListener('click',  () => Reveal.prev());
  document.getElementById('btn-next').addEventListener('click',  () => Reveal.next());
  document.getElementById('btn-reset').addEventListener('click', () => Reveal.slide(0, 0));

  /* ──────────────────────────────────────────────────
     Sidebar toggle
  ────────────────────────────────────────────────── */
  function toggleNav(open) {
    navOpen = open;
    document.getElementById('slide-nav').classList.toggle('collapsed', !open);
    document.getElementById('slide-nav-open').classList.toggle('visible', !open);
    setNavWidth(open ? NAV_W : 0);
  }

  document.getElementById('slide-nav-toggle').addEventListener('click', () => toggleNav(false));
  document.getElementById('slide-nav-open').addEventListener('click',   () => toggleNav(true));
</script>

</body>
</html>
